name: Test Setup Scripts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

jobs:
  test-mirrors-script:
    name: Test setup_mirrors.sh
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test mirrors setup script
        run: |
          echo "=== Testing setup_mirrors.sh ==="
          chmod +x setup_mirrors.sh
          sudo ./setup_mirrors.sh

      - name: Verify APT source
        run: |
          echo "=== Verifying APT source ==="
          cat /etc/apt/sources.list
          grep -q "mirrors.aliyun.com" /etc/apt/sources.list && echo "APT source OK"

      - name: Verify Docker config
        run: |
          echo "=== Verifying Docker config ==="
          cat /etc/docker/daemon.json
          test -f /etc/docker/daemon.json && echo "Docker config OK"

      - name: Verify NPM config
        run: |
          echo "=== Verifying NPM config ==="
          # Script runs with sudo, so .npmrc is in /root/.npmrc
          cat /root/.npmrc
          grep -q "npmmirror.com" /root/.npmrc && echo "NPM registry OK"

  test-zsh-script:
    name: Test setup_zsh_env.sh
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test zsh env setup script
        run: |
          echo "=== Testing setup_zsh_env.sh ==="
          chmod +x setup_zsh_env.sh
          sudo ./setup_zsh_env.sh

      - name: Verify zsh installation
        run: |
          echo "=== Verifying zsh installation ==="
          which zsh && echo "Zsh installed OK"

      - name: Verify Oh My Zsh
        run: |
          echo "=== Verifying Oh My Zsh ==="
          # Script runs with sudo, so files are in /root/.oh-my-zsh
          test -d /root/.oh-my-zsh && echo "Oh My Zsh installed OK"

      - name: Verify plugins
        run: |
          echo "=== Verifying plugins ==="
          ls -la /root/.zsh/
          test -d /root/.zsh/zsh-autosuggestions && echo "autosuggestions OK"
          test -d /root/.zsh/zsh-syntax-highlighting && echo "syntax-highlighting OK"
